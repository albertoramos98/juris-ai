<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login - Juris AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, #1e293b 100%);
      margin: 0;
      padding: 20px;
    }
    
    .login-container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      margin: 0 auto 24px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.05);
      padding: 4px;
      border-radius: 12px;
      border: none;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      font-weight: 500;
    }

    input {
      background: rgba(255,255,255,0.05);
    }

    button.primary {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      justify-content: center;
      margin-top: 10px;
    }

    #errorMsg {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="brand-icon"><i class="fas fa-balance-scale"></i></div>
  <h1 class="login-title">Juris AI</h1>
  <p class="login-subtitle">Plataforma de Inteligência Jurídica</p>

  <div class="tabs">
    <button id="tabLogin" class="tab-btn active" onclick="toggleMode('login')">Entrar</button>
    <button id="tabRegister" class="tab-btn" onclick="toggleMode('register')">Novo Escritório</button>
  </div>

  <form id="authForm">
    <!-- Campos de Registro (Ocultos no Login) -->
    <div id="registerFields" style="display: none;">
      <div class="form-group">
        <label>Nome do Usuário</label>
        <input type="text" id="regName" placeholder="Seu nome completo" />
      </div>
      <div class="form-group">
        <label>Nome do Escritório</label>
        <input type="text" id="regOffice" placeholder="Ex: Silva & Associados" />
      </div>
    </div>

    <!-- Campos Comuns -->
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com.br" required />
    </div>
    
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>

    <button type="submit" class="primary" id="btnSubmit">
      Entrar no Sistema <i class="fas fa-arrow-right"></i>
    </button>
  </form>

  <div style="margin: 24px 0; display: flex; align-items: center; gap: 16px;">
    <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
    <span style="color: var(--text-muted); font-size: 13px; font-weight: 500;">OU</span>
    <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
  </div>

  <button class="secondary" id="btnGoogle" style="width: 100%; justify-content: center; padding: 12px; gap: 12px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 18px; height: 18px;">
    Continuar com o Google
  </button>

  <div id="errorMsg"></div>
</div>

<script src="config.js"></script>
<script src="storage.js"></script>
<script src="http.js"></script>
<script src="login.js"></script>
<script>
  let mode = 'login';
  
  function toggleMode(newMode) {
    mode = newMode;
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    
    document.getElementById('registerFields').style.display = mode === 'register' ? 'block' : 'none';
    
    const btn = document.getElementById('btnSubmit');
    if (mode === 'login') {
      btn.innerHTML = 'Entrar no Sistema <i class="fas fa-arrow-right"></i>';
    } else {
      btn.innerHTML = 'Criar Conta <i class="fas fa-user-plus"></i>';
    }
    
    document.getElementById('errorMsg').style.display = 'none';
  }
</script>

</body>
</html>
