<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Documentos - Juris AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="app-shell">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-balance-scale"></i></div>
        <h2>Juris AI</h2>
      </div>

      <nav class="nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
        <a href="process.html"><i class="fas fa-gavel"></i> <span>Processos</span></a>
        <a class="active" href="documents.html"><i class="fas fa-folder-open"></i> <span>Documentos</span></a>
        <a href="styles.html"><i class="fas fa-pen-nib"></i> <span>Treinar Estilo</span></a>
        <a href="knowledge.html"><i class="fas fa-book"></i> <span>Biblioteca Jurídica</span></a>
        <a href="attacks.html"><i class="fas fa-shield-halved"></i> <span>Ataque & Defesa</span></a>
        <a href="meeting.html"><i class="fas fa-microphone"></i> <span>Reuniões</span></a>
        <a href="import.html"><i class="fas fa-file-import"></i> <span>Importar</span></a>
        <a href="team.html"><i class="fas fa-users"></i> <span>Equipe</span></a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Gestão de Documentos</h1>
          <p style="color: var(--text-secondary); font-size: 14px;">Visão global de todos os arquivos anexados nos processos do escritório.</p>
        </div>
        <div class="topbar-actions">
          <button class="secondary" id="btnRefresh" type="button"><i class="fas fa-sync-alt"></i> Recarregar</button>
          <button class="secondary" type="button" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
      </header>

      <div class="panel">
        <div class="panel-header">
          <h3 class="panel-title"><i class="fas fa-folder-open"></i> Arquivos Indexados</h3>
          <div style="display: flex; gap: 12px; width: 300px;">
            <select id="filterCategory" style="padding: 8px 12px;">
              <option value="">Todas as Categorias</option>
              <option value="inicial">Petição Inicial</option>
              <option value="procuracao">Procuração</option>
              <option value="contrato">Contrato/Honorários</option>
              <option value="docs_cliente">Documentos do Cliente</option>
            </select>
          </div>
        </div>

        <div style="overflow-x: auto;">
          <table class="data-table" id="docsTable">
            <thead>
              <tr>
                <th><i class="fas fa-file-alt"></i> Nome do Arquivo</th>
                <th><i class="fas fa-tag"></i> Categoria</th>
                <th><i class="fas fa-calendar-day"></i> Data</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="docsTbody">
              <tr>
                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 40px;">Carregando documentos...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <script src="http.js"></script>
  <script src="guard.js"></script>
  <script src="documents.js"></script>
</body>
</html>
