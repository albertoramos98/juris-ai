<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Base de Conhecimento - Juris AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-balance-scale"></i></div>
        <h2>Juris AI</h2>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
        <a href="process.html"><i class="fas fa-gavel"></i> <span>Processos</span></a>
        <a href="documents.html"><i class="fas fa-folder-open"></i> <span>Documentos</span></a>
        <a href="styles.html"><i class="fas fa-pen-nib"></i> <span>Treinar Estilo</span></a>
        <a class="active" href="knowledge.html"><i class="fas fa-book"></i> <span>Biblioteca Jurídica</span></a>
        <a href="attacks.html"><i class="fas fa-shield-halved"></i> <span>Ataque & Defesa</span></a>
        <a href="meeting.html"><i class="fas fa-microphone"></i> <span>Reuniões</span></a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Biblioteca Jurídica (Base Global)</h1>
          <p style="color: var(--text-secondary);">Cadastre teses, leis e súmulas que a IA utilizará para fundamentar TODOS os processos.</p>
        </div>
      </header>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div class="panel">
          <h3 class="panel-title"><i class="fas fa-plus-circle"></i> Adicionar Conhecimento</h3>
          <div class="form-group">
            <label>Título / Referência (Ex: Súmula 331 do TST)</label>
            <input type="text" id="gkTitle" placeholder="Digite o título..." />
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="gkCategory">
              <option value="jurisprudencia">Jurisprudência</option>
              <option value="lei">Legislação</option>
              <option value="doutrina">Doutrina</option>
              <option value="tese_interna">Tese Interna do Escritório</option>
            </select>
          </div>
          <div class="form-group">
            <label>Texto Completo</label>
            <textarea id="gkContent" rows="6" placeholder="Cole aqui o texto da decisão, lei ou tese..." style="resize: vertical;"></textarea>
          </div>
          <button id="btnSaveGK" class="primary" style="width: 100%; justify-content: center;">
            <i class="fas fa-brain"></i> Vetorizar e Salvar na Base
          </button>
          <div id="gkStatus" style="margin-top: 16px; text-align: center; font-weight: 500;"></div>
        </div>

        <div class="panel">
          <h3 class="panel-title"><i class="fas fa-database"></i> Textos Indexados</h3>
          <div id="gkList" style="display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 8px;">
            <p class="muted">Carregando biblioteca...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <script src="http.js"></script>
  <script src="guard.js"></script>
  <script>
    async function loadGK() {
        const container = document.getElementById('gkList');
        try {
            // Usando fetch direto com authHeaders para garantir consistência
            const res = await fetch(`${API}/global-knowledge/`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
            container.innerHTML = '';
            
            if(!data || data.length === 0) {
                container.innerHTML = '<p class="muted">Nenhum texto cadastrado ainda.</p>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'alert';
                div.style.background = 'rgba(255,255,255,0.05)';
                div.style.marginBottom = '12px';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="badge" style="background: var(--primary-dark); font-size: 10px;">${item.category.toUpperCase()}</span>
                        <small class="muted">${new Date().toLocaleDateString()}</small>
                    </div>
                    <div style="font-weight: bold; color: var(--primary); margin-top: 8px; font-size: 14px;">${item.title}</div>
                    <div style="font-size: 11px; margin-top: 4px; color: var(--text-secondary); line-height: 1.4;">
                        ${(item.content_text || "").substring(0, 120)}...
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<p class="danger">Erro ao carregar base.</p>';
        }
    }

    document.getElementById('btnSaveGK').addEventListener('click', async () => {
        const title = document.getElementById('gkTitle').value;
        const category = document.getElementById('gkCategory').value;
        const content = document.getElementById('gkContent').value;
        const status = document.getElementById('gkStatus');
        const btn = document.getElementById('btnSaveGK');

        if (!title || !content) return alert("Preencha título e conteúdo.");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';
        status.textContent = "Gerando vetores com IA...";
        status.style.color = "var(--text-secondary)";

        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`${API}/global-knowledge/`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, category, content_text: content })
            });

            const data = await res.json();
            if (res.ok) {
                status.style.color = 'var(--accent)';
                status.textContent = "✓ Texto salvo e indexado!";
                document.getElementById('gkTitle').value = '';
                document.getElementById('gkContent').value = '';
                setTimeout(() => { status.textContent = ""; }, 3000);
                loadGK();
            } else {
                throw new Error(data.detail || "Erro ao salvar.");
            }
        } catch (e) {
            status.style.color = 'var(--danger)';
            status.textContent = "Erro: " + e.message;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-brain"></i> Vetorizar e Salvar na Base';
        }
    });

    loadGK();
  </script>
</body>
</html>
